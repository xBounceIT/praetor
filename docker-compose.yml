services:
  # Developer compose (builds images from local source).
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: praetor-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-praetor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-praetor}
      POSTGRES_DB: ${POSTGRES_DB:-praetor}
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-praetor} -d ${POSTGRES_DB:-praetor}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API Server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: praetor-backend
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-praetor}
      DB_USER: ${POSTGRES_USER:-praetor}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-praetor}
      JWT_SECRET: ${JWT_SECRET:-praetor-secret-key-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-praetor-encryption-key-change-in-production}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      DEMO_SEEDING: ${DEMO_SEEDING:-false}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-password}
      FRONTEND_URL: http://${SERVER_IP:-localhost}:3000
    volumes:
      - ssl_certs:/app/certs
    expose:
      - '3001'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend (Caddy serving static files)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: praetor-frontend
    ports:
      - '3000:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  ssl_certs:
