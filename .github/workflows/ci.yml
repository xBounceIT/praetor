name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint, Typecheck & DB Schema Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install server dependencies
        run: bun install --frozen-lockfile
        working-directory: server

      - name: Lint and typecheck
        run: bun run lint

      - name: Drizzle drift check
        run: bun run db:check
        working-directory: server

      - name: Schema regeneration check
        run: |
          bun run db:generate --name __ci_drift_check__
          # Filter to the file patterns drizzle-kit writes for a real migration:
          # the SQL file and its companion snapshot. _journal.json is excluded so
          # a future drizzle-kit version that touches it on a no-diff run cannot
          # cause a spurious failure — real drift always produces both an SQL
          # file and a snapshot, which this glob catches.
          status=$(git status --porcelain -- 'db/migrations/0*.sql' 'db/migrations/meta/0*_snapshot.json')
          # Restore the working tree before exiting so subsequent steps and
          # local copies of this snippet don't accumulate phantom migrations.
          git checkout -- db/migrations/ 2>/dev/null || true
          git clean -fd db/migrations/ 2>/dev/null || true
          if [ -n "$status" ]; then
            echo "::error::Schema TS modified without regenerating migration. Run: cd server && bun run db:generate --name <descriptive_name>"
            echo "$status"
            exit 1
          fi
        working-directory: server

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install server dependencies
        run: bun install --frozen-lockfile
        working-directory: server

      - name: Run tests
        run: bun run test

  ldap-integration:
    name: LDAP Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install server dependencies
        run: bun install --frozen-lockfile
        working-directory: server

      - name: Generate self-signed CA + server cert
        working-directory: server/test/integration
        run: |
          mkdir -p .certs
          cd .certs
          openssl req -x509 -newkey rsa:2048 -nodes -days 30 \
            -keyout ca.key -out ca.crt -subj "/CN=Praetor Test CA" \
            -config ../fixtures/openssl.cnf -extensions v3_ca
          openssl req -newkey rsa:2048 -nodes -keyout server.key \
            -out server.csr -subj "/CN=localhost" \
            -config ../fixtures/openssl.cnf
          openssl x509 -req -in server.csr -CA ca.crt -CAkey ca.key \
            -CAcreateserial -out server.crt -days 30 \
            -extfile ../fixtures/openssl.cnf -extensions v3_server
          # bitnami/openldap runs as uid 1001; world-readable certs avoid permission issues.
          chmod 644 *.crt *.key

      - name: Start OpenLDAP container
        working-directory: server/test/integration
        run: |
          docker run -d --name praetor-ldap \
            -p 1389:1389 -p 1636:1636 \
            -e LDAP_ROOT="dc=praetor,dc=test" \
            -e LDAP_ADMIN_USERNAME=admin \
            -e LDAP_ADMIN_PASSWORD=adminpass \
            -e LDAP_SKIP_DEFAULT_TREE=yes \
            -e LDAP_CUSTOM_LDIF_DIR=/ldifs \
            -e LDAP_ENABLE_TLS=yes \
            -e LDAP_TLS_CERT_FILE=/certs/server.crt \
            -e LDAP_TLS_KEY_FILE=/certs/server.key \
            -e LDAP_TLS_CA_FILE=/certs/ca.crt \
            -v "$PWD/fixtures":/ldifs:ro \
            -v "$PWD/.certs":/certs:ro \
            bitnamilegacy/openldap:2.6.10-debian-12-r4

      - name: Wait for LDAP ready
        run: |
          for i in $(seq 1 30); do
            if docker exec praetor-ldap ldapsearch -x -H ldap://localhost:1389 \
                 -b "dc=praetor,dc=test" -D "cn=admin,dc=praetor,dc=test" \
                 -w adminpass "(uid=alice)" uid >/dev/null 2>&1; then
              echo "LDAP ready after ~$((i*2))s"
              echo "--- Seeded directory contents (baseDn subtree, dn only):"
              docker exec praetor-ldap ldapsearch -x -H ldap://localhost:1389 \
                -b "dc=praetor,dc=test" -D "cn=admin,dc=praetor,dc=test" \
                -w adminpass "(objectClass=*)" dn 2>&1 | grep '^dn:' || true
              exit 0
            fi
            sleep 2
          done
          echo "::error::LDAP did not become ready within 60s"
          docker logs praetor-ldap
          exit 1

      - name: Wait for LDAPS (1636) ready
        run: |
          for i in $(seq 1 15); do
            # Reachability + TLS handshake from the runner host using the generated CA.
            if openssl s_client -connect localhost:1636 \
                 -CAfile server/test/integration/.certs/ca.crt \
                 -verify_return_error </dev/null >/dev/null 2>&1; then
              echo "LDAPS ready after ~$((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::LDAPS did not become ready within 30s — TLS likely failed to start"
          echo "--- Container logs (slapd / TLS startup):"
          docker logs praetor-ldap
          exit 1

      - name: Run LDAP integration tests
        working-directory: server
        env:
          LDAP_TEST_URL: ldap://localhost:1389
          LDAP_TEST_TLS_URL: ldaps://localhost:1636
          LDAP_TLS_CA_FILE: ${{ github.workspace }}/server/test/integration/.certs/ca.crt
          LDAP_REJECT_UNAUTHORIZED: 'true'
        run: bun run test:integration

      - name: Capture LDAP logs on failure
        if: failure()
        run: docker logs praetor-ldap

      - name: Tear down LDAP container
        if: always()
        run: docker rm -f praetor-ldap || true

  build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

  docker-stack:
    name: Docker Stack Deploy & Health
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for backend startup migration
        run: |
          for i in $(seq 1 30); do
            if docker compose logs --no-color --no-log-prefix backend 2>/dev/null | grep -q 'Drizzle migrations applied or already up to date'; then
              echo "Backend startup migrations completed after ~$((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Backend did not complete startup migrations within 60s"
          docker compose logs backend
          exit 1

      - name: Wait for backend startup signal
        run: |
          for i in $(seq 1 30); do
            if docker compose logs --no-color --no-log-prefix backend 2>/dev/null | grep -q 'Praetor API server running'; then
              echo "Backend ready after ~$((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not log 'Praetor API server running' within 60s"
          docker compose logs backend
          exit 1

      - name: Verify Drizzle startup migration is idempotent
        run: docker compose exec -T backend bun run db:migrate

      - name: Verify migration recorded in __drizzle_migrations
        run: |
          expected=$(ls server/db/migrations/*.sql | wc -l | tr -d '[:space:]')
          count=$(docker compose exec -T postgres psql -U "${POSTGRES_USER:-praetor}" -d "${POSTGRES_DB:-praetor}" -tAc 'SELECT COUNT(*) FROM drizzle.__drizzle_migrations' | tr -d '[:space:]')
          if [ "$count" != "$expected" ]; then
            echo "::error::Expected $expected rows in drizzle.__drizzle_migrations (one per .sql file in server/db/migrations/), got '$count'"
            docker compose exec -T postgres psql -U "${POSTGRES_USER:-praetor}" -d "${POSTGRES_DB:-praetor}" -c 'SELECT * FROM drizzle.__drizzle_migrations'
            exit 1
          fi

      - name: Probe /api/health via Caddy proxy
        run: |
          for i in 1 2 3; do
            if curl -fsS http://localhost:3000/api/health; then
              exit 0
            fi
            sleep 1
          done
          echo "/api/health failed via Caddy proxy after backend became ready"
          docker compose logs
          exit 1

      - name: Probe frontend SPA shell
        run: |
          response=$(mktemp)
          code=$(curl -s -o "$response" -w '%{http_code}' http://localhost:3000/ || echo 000)
          if [ "$code" != 200 ]; then
            echo "Frontend SPA returned $code"
            head -c 500 "$response"
            exit 1
          fi
          if ! grep -qiE '<(!doctype html|html)' "$response"; then
            echo "Frontend response did not look like HTML"
            head -c 500 "$response"
            exit 1
          fi

      - name: Verify all defined services are running
        run: |
          expected=$(docker compose config --services | sort | paste -sd, -)
          running=$(docker compose ps --status running --services | sort | paste -sd, -)
          echo "running:  $running"
          echo "expected: $expected"
          if [ "$running" != "$expected" ]; then
            docker compose ps
            exit 1
          fi

      - name: Capture container logs
        if: always()
        run: |
          mkdir -p logs
          docker compose logs --no-color --no-log-prefix postgres > logs/postgres.log 2>&1 || true
          docker compose logs --no-color --no-log-prefix backend > logs/backend.log 2>&1 || true
          docker compose logs --no-color --no-log-prefix frontend > logs/frontend.log 2>&1 || true
          perl -i -pe 's/\e\[[\d;]*[A-Za-z]//g' logs/postgres.log logs/backend.log logs/frontend.log

      - name: Dump container logs to console
        if: always()
        run: |
          for svc in postgres backend frontend; do
            echo "===== $svc ====="
            cat "logs/$svc.log"
          done

      - name: Upload stack logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-stack-logs
          path: logs/
          retention-days: 7

      - name: Scan postgres logs for FATAL/PANIC
        run: |
          if grep -nE '\b(FATAL|PANIC):' logs/postgres.log; then
            echo "::error::Postgres logged FATAL or PANIC"
            exit 1
          fi

      - name: Scan backend logs for error/fatal entries
        run: |
          if grep -nE '^\[[^]]+\] (ERROR|FATAL)\b' logs/backend.log; then
            echo "::error::Backend pretty logs contain ERROR or FATAL"
            exit 1
          fi
          if grep -nE '"level":(50|60)\b' logs/backend.log; then
            echo "::error::Backend JSON logs contain error/fatal level"
            exit 1
          fi
          if grep -nF 'Failed to start server' logs/backend.log; then
            echo "::error::Backend logged 'Failed to start server'"
            exit 1
          fi

      - name: Scan frontend (Caddy) logs for error/fatal entries
        run: |
          if grep -nE '"level":"(error|fatal)"' logs/frontend.log; then
            echo "::error::Caddy JSON logs contain error/fatal level"
            exit 1
          fi
          if grep -niwE 'panic' logs/frontend.log; then
            echo "::error::Caddy logs contain 'panic'"
            exit 1
          fi

      - name: Tear down stack
        if: always()
        run: docker compose down -v
